
- id: service_crash
  name: App container crash
  type: container
  benign: false
  symptom: >-
    App is unreachable: connections to :8000 refused, health probe fails, callers
    see 502/connection errors.
  root_cause: The app container is not running (it crashed or was stopped).
  correct_fix: Restart the app container (docker compose start app / restart the service).
  detect_signals:
    - app container status is not "running"
    - connection refused on http://localhost:8000
  inject: {action: stop_container, service: app}
  clear: {action: start_container, service: app}

- id: database_down
  name: Postgres unreachable
  type: container
  benign: false
  symptom: >-
    /health reports postgres:false and returns 503; endpoints that read/write the
    DB (/items) return 5xx with connection errors. Redis-cached reads may still work.
  root_cause: The Postgres container is down, so the app cannot open DB connections.
  correct_fix: Restart the Postgres container and confirm the app reconnects.
  detect_signals:
    - postgres container status is not "running"
    - /health checks.postgres == false
    - DB connection errors in app logs
  inject: {action: stop_container, service: postgres}
  clear: {action: start_container, service: postgres}

- id: latency_injection
  name: Elevated request latency
  type: app
  benign: false
  symptom: >-
    p99 (and p50) request latency spikes well above baseline across endpoints;
    callers see slow responses / timeouts. Error rate stays low; dependencies are up.
  root_cause: >-
    Injected per-request latency in the app (simulating a slow dependency / GC
    pause), not a crash or dependency outage.
  correct_fix: >-
    Remove the injected latency (clear the fault); in a real system, identify and
    fix the slow code path or dependency.
  detect_signals:
    - /metrics p99_latency_ms far above baseline
    - dependencies still healthy, error_rate near zero
  inject: {action: admin_inject, payload: {latency_ms: 800}}
  clear: {action: admin_clear}

- id: cache_down
  name: Redis unreachable
  type: container
  benign: false
  symptom: >-
    /health reports redis:false and returns 503; endpoints that use the cache
    (/items) error out. Postgres stays up, so the outage is isolated to the cache.
  root_cause: The Redis container is down, so the app cannot reach the cache.
  correct_fix: Restart the Redis container and confirm the app reconnects.
  detect_signals:
    - redis container status is not "running"
    - /health checks.redis == false
    - cache/connection errors in app logs
  inject: {action: stop_container, service: redis}
  clear: {action: start_container, service: redis}

- id: error_rate_spike
  name: Elevated error rate
  type: app
  benign: false
  symptom: >-
    A significant fraction of requests return 5xx; /metrics error_rate climbs well
    above zero. Dependencies stay healthy and latency is normal — the app itself is
    failing requests.
  root_cause: >-
    The app is throwing errors on a portion of requests (bad deploy / failing code
    path), not a dependency outage.
  correct_fix: >-
    Roll back or fix the failing endpoint (clear the injected failure); dependencies
    need no action.
  detect_signals:
    - /metrics error_rate well above baseline
    - dependencies still healthy, latency normal
  inject: {action: admin_inject, payload: {fail_rate: 0.5}}
  clear: {action: admin_clear}

- id: connection_pool_exhaustion
  name: DB connection pool exhausted
  type: app
  benign: false
  traffic: 20
  symptom: >-
    Requests that touch the database return 503 "db pool exhausted"; /health reports
    postgres:false. But the Postgres container is still running — the app just can't
    get a connection.
  root_cause: >-
    The app's small DB connection pool is fully checked out (a leak / too few
    connections for the load), so new queries can't acquire a connection. Postgres
    itself is healthy.
  correct_fix: >-
    Release the leaked connections (or raise the pool size) and fix whatever holds
    connections open. Do NOT restart Postgres — it is not the problem.
  detect_signals:
    - postgres CONTAINER is running (not exited)
    - /items returns 503 with "db pool exhausted"
    - /health checks.postgres == false despite the container being up
  inject: {action: admin_inject, payload: {hold_db_conns: 5}}
  clear: {action: admin_clear}

- id: memory_leak
  name: App memory growth
  type: app
  benign: false
  symptom: >-
    The app's memory_rss_mb climbs far above its ~63MB baseline and keeps growing;
    left unchecked it would OOM and restart. Dependencies and error rate look normal.
  root_cause: The app is leaking memory (unbounded allocation not being freed).
  correct_fix: Restart the app to reclaim memory, then find and fix the leak in code.
  detect_signals:
    - /metrics memory_rss_mb far above baseline
    - dependencies healthy, error_rate and latency normal
  inject: {action: admin_inject, payload: {leak_mb: 300}}
  clear: {action: admin_clear}

- id: benign_healthy
  name: Steady state (no incident)
  type: benign
  benign: true
  symptom: All services healthy, metrics nominal. Nothing is wrong.
  root_cause: No fault — the system is operating normally.
  correct_fix: No action needed.
  detect_signals:
    - all containers running, error_rate ~0, latency nominal
  inject: {action: reset}
  clear: {action: noop}

- id: benign_load_spike
  name: Normal load spike (no incident)
  type: benign
  benign: true
  traffic: 60
  symptom: >-
    Request volume rises sharply but all requests succeed quickly; error_rate stays
    ~0 and latency stays nominal. Just more traffic, not a fault.
  root_cause: No fault — a benign increase in traffic the system handles fine.
  correct_fix: No action needed (scale only if this becomes sustained).
  detect_signals:
    - elevated request_count, error_rate ~0, latency nominal, deps healthy
  inject: {action: reset}
  clear: {action: noop}

- id: benign_minor_errors
  name: Minor transient errors (no incident)
  type: benign
  benign: true
  traffic: 40
  symptom: >-
    A small fraction of requests fail (~5%), within normal noise. error_rate is low
    and dependencies are healthy — not worth paging on.
  root_cause: No real incident — a low, tolerable rate of transient errors.
  correct_fix: No action needed; keep monitoring.
  detect_signals:
    - error_rate low (well under alarm threshold), deps healthy
  inject: {action: admin_inject, payload: {fail_rate: 0.05}}
  clear: {action: admin_clear}

# The system to monitor: app + Postgres + Redis. Small on purpose.
services:
  app:
    build: ./system
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://sre:sre@postgres:5432/sre
      REDIS_URL: redis://redis:6379/0
      DB_POOL_MAX: "5"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: sre
      POSTGRES_PASSWORD: sre
      POSTGRES_DB: sre
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sre"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10
